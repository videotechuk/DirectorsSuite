; ============================================================
;  Director's Suite - configuration
;  Place this file next to RDR2.exe (it is also auto-created
;  there on first run if missing).
;
;  Key values are Windows virtual-key codes (decimal):
;  https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
;  Examples: F1=112  F2=113  F4=115  F5=116  F6=117  INSERT=45  C=67  B=66  0=disabled
; ============================================================

[Keys]
; Open/close the editor menu (default F2; controller: hold RB + press A)
KeyOpenMenu=113
; Start/stop automatic camera switching (0 = unassigned)
KeyCameraAutoSwitchingStartStop=0
; Hold while free aiming to use Aim Assist (default C)
KeyAimAssist=67
; Insert a camera at the current view (default INSERT)
KeyAddCamera=45
; Toggle the custom player camera (0 = unassigned)
KeyPlayerCamToggle=0
; Switch to the next / previous enabled camera (default N / B)
KeyNextCamera=78
KeyPrevCamera=66
; Toggle the Photo Mode editor (default F1)
KeyPhotoMode=112
; Take a lossless / HDR screenshot anywhere (default F3)
KeyScreenshot=114

[FreeCam]
; Base fly speed per frame
Speed=0.35
; Multiplier while holding Shift
FastMultiplier=4.0
; Multiplier while holding Ctrl
SlowMultiplier=0.2
; Mouse / right-stick look sensitivity
MouseSensitivity=4.0
; Stream the world around the camera (full detail anywhere, costs memory)
HighDetail=1

[Cameras]
; Automatic camera naming template.
; Placeholders: {index} {total} {hour} {minute}
NamingTemplate=CAM {index}
; Defaults applied to newly inserted cameras
DefaultDurationMs=5000
DefaultTransitionMs=1500

[Clouds]
; Cloud drift per frame while "Move Clouds" is enabled (precision settings)
SpeedX=0.0005
SpeedY=0.0002
; Step size of the in-menu "Cloud Height" slider
HeightStep=5.0
; Optional cloud noise (0 = leave untouched)
NoiseX=0.0
NoiseY=0.0
NoiseZ=0.0

[AimAssist]
; Maximum lock-on distance in meters
MaxDistance=120.0
; Half-angle of the assist cone around the crosshair, in degrees
ConeDegrees=25.0
; Comma-separated model names for the "Specific Models" target option,
; e.g. Models=A_C_Deer_01,A_C_Wolf,A_C_BearBlack_01
Models=

[Director]
; Extra ped models for Director Mode > Add NPC > Custom (comma separated).
; Any valid model name works, e.g.:
; CustomPeds=cs_gavin,a_c_horse_arabian_black,u_m_m_circuswagon_01
CustomPeds=

[Interface]
; Drawn letterbox bar height as a fraction of the screen (0.04 - 0.30)
LetterboxRatio=0.12
; Grid overlay subdivisions
GridRows=3
GridColumns=3

[OBS]
; Automatic recording via the obs-websocket 5.x protocol.
; In OBS: Tools > WebSocket Server Settings > Enable, then copy the password here.
; Master switch for OBS integration (0 = off)
Enabled=0
; Automatically start/stop recording around "Play Full Project" (1 = on)
AutoRecord=1
; Hide the HUD while a project plays/records for a clean capture (1 = on)
HideHudDuringPlayback=1
; obs-websocket server address (default localhost:4455)
Host=127.0.0.1
Port=4455
; obs-websocket password - must match the one shown in OBS. Leave blank only
; if you disabled authentication in OBS.
Password=
